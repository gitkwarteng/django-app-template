[uwsgi]
# Application settings
module = main.wsgi:application
chdir = /opt/app

# Process settings
master = true
processes = 4
threads = 2

# Socket settings
http-socket = 0.0.0.0:8000
protocol = http

# Performance settings
buffer-size = 65535
post-buffering = 8192

# Timeouts
harakiri = 60

# Logging
logto = /var/log/uwsgi/django.log
log-format = %(addr) - %(user) [%(ltime)] "%(method) %(uri) %(proto)" %(status) %(size) "%(referer)" "%(uagent)"
log-reopen = daily
log-backupname = /var/log/uwsgi/django.log.backup

# Security
chmod-socket = 664

# Reload settings
touch-reload = /opt/app/reload.trigger